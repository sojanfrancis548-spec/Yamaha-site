<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin — Yamaha Leads</title>
  <style>
    body { font-family: sans-serif; background: #0d1117; color: #e6edf3; padding: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 14px; border-bottom: 1px solid #1b2330; text-align: left; }
    th { color: #9aa7b0; font-weight: 600; }
    tr:hover td { background: #0f1420; }

    /* Yamaha loading screen (scoped to overlay only) */
    #yamaha-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      background: #0a0a0a;
      transition: opacity 520ms cubic-bezier(.2,.8,.2,1), visibility 520ms cubic-bezier(.2,.8,.2,1);
    }
    #yamaha-loader.is-hidden { opacity: 0; visibility: hidden; }

    #yamaha-loader * { box-sizing: border-box; }
    #yamaha-loader .loader-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 32px 18px;
    }
    #yamaha-loader .speed-lines {
      position: absolute;
      width: 600px;
      height: 600px;
      opacity: 0.05;
      animation: yamahaRotateLines 8s linear infinite;
      pointer-events: none;
    }
    @keyframes yamahaRotateLines {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    #yamaha-loader .bg-rings {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      pointer-events: none;
    }
    #yamaha-loader .bg-rings::before,
    #yamaha-loader .bg-rings::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(30, 100, 200, 0.15);
      animation: yamahaExpandRing 2.5s ease-out infinite;
    }
    #yamaha-loader .bg-rings::before {
      width: 280px; height: 280px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: 0s;
    }
    #yamaha-loader .bg-rings::after {
      width: 380px; height: 380px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: 0.5s;
    }
    @keyframes yamahaExpandRing {
      0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.6; }
      100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; }
    }
    #yamaha-loader .logo-zone {
      position: relative;
      z-index: 2;
      margin-bottom: 26px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    #yamaha-loader .yamaha-logo {
      width: 92px;
      height: 92px;
      animation: yamahaLogoSpin 3s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(30, 80, 200, 0.6));
    }
    @keyframes yamahaLogoSpin {
      0% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(120deg) scale(1.05); }
      50% { transform: rotate(240deg) scale(1); }
      75% { transform: rotate(360deg) scale(1.05); }
      100% { transform: rotate(360deg) scale(1); }
    }
    #yamaha-loader .brand-name {
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: 52px;
      letter-spacing: 8px;
      color: #fff;
      line-height: 1;
      animation: yamahaFadeIn 0.8s ease both;
      text-shadow: 0 0 30px rgba(30, 100, 220, 0.5);
    }
    #yamaha-loader .brand-tagline {
      font-family: 'Rajdhani', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 5px;
      color: #5580cc;
      text-transform: uppercase;
      animation: yamahaFadeIn 1s ease 0.3s both;
    }
    @keyframes yamahaFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #yamaha-loader .loader-bar-wrap {
      width: 240px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 28px;
      position: relative;
      z-index: 2;
    }
    #yamaha-loader .loader-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1a4fcc, #4d88ff, #1a4fcc);
      background-size: 200%;
      border-radius: 2px;
      animation: yamahaLoadProgress 3s cubic-bezier(0.4, 0, 0.2, 1) forwards, yamahaShimmer 1s linear infinite;
      box-shadow: 0 0 12px rgba(77, 136, 255, 0.8);
    }
    @keyframes yamahaLoadProgress {
      0% { width: 0%; }
      20% { width: 25%; }
      50% { width: 60%; }
      80% { width: 82%; }
      100% { width: 100%; }
    }
    @keyframes yamahaShimmer {
      0% { background-position: 200% center; }
      100% { background-position: -200% center; }
    }
    #yamaha-loader .dots {
      display: flex;
      gap: 8px;
      margin-top: 18px;
      z-index: 2;
      position: relative;
    }
    #yamaha-loader .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #1a4fcc;
    }
    #yamaha-loader .dot:nth-child(1) { animation: yamahaDotPulse 1.2s ease 0s infinite; }
    #yamaha-loader .dot:nth-child(2) { animation: yamahaDotPulse 1.2s ease 0.2s infinite; }
    #yamaha-loader .dot:nth-child(3) { animation: yamahaDotPulse 1.2s ease 0.4s infinite; }
    @keyframes yamahaDotPulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.5); opacity: 1; }
    }
    #yamaha-loader .loader-status {
      margin-top: 14px;
      font-family: 'Rajdhani', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      animation: yamahaBlink 1.5s ease infinite;
      position: relative;
      z-index: 2;
    }
    @keyframes yamahaBlink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
    @media (prefers-reduced-motion: reduce) {
      #yamaha-loader .speed-lines,
      #yamaha-loader .bg-rings::before,
      #yamaha-loader .bg-rings::after,
      #yamaha-loader .yamaha-logo,
      #yamaha-loader .loader-bar,
      #yamaha-loader .dot,
      #yamaha-loader .loader-status { animation: none !important; }
      #yamaha-loader { transition: none; }
    }
  </style>
</head>
<body>
  <div id="yamaha-loader" data-started-at="" role="status" aria-live="polite" aria-label="Loading">
    <div class="loader-wrap">
      <svg class="speed-lines" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g transform="translate(300,300)">
          <line x1="0" y1="0" x2="300" y2="0" stroke="white" stroke-width="1"/>
          <line x1="0" y1="0" x2="283" y2="100" stroke="white" stroke-width="1"/>
          <line x1="0" y1="0" x2="212" y2="212" stroke="white" stroke-width="1"/>
          <line x1="0" y1="0" x2="100" y2="283" stroke="white" stroke-width="1"/>
          <line x1="0" y1="0" x2="0" y2="300" stroke="white" stroke-width="1"/>
          <line x1="0" y1="0" x2="-100" y2="283" stroke="white" stroke-width="1"/>
          <line x1="0" y1="0" x2="-212" y2="212" stroke="white" stroke-width="1"/>
          <line x1="0" y1="0" x2="-283" y2="100" stroke="white" stroke-width="1"/>
          <line x1="0" y1="0" x2="-300" y2="0" stroke="white" stroke-width="1"/>
          <line x1="0" y1="0" x2="-283" y2="-100" stroke="white" stroke-width="1"/>
          <line x1="0" y1="0" x2="-212" y2="-212" stroke="white" stroke-width="1"/>
          <line x1="0" y1="0" x2="-100" y2="-283" stroke="white" stroke-width="1"/>
          <line x1="0" y1="0" x2="0" y2="-300" stroke="white" stroke-width="1"/>
          <line x1="0" y1="0" x2="100" y2="-283" stroke="white" stroke-width="1"/>
          <line x1="0" y1="0" x2="212" y2="-212" stroke="white" stroke-width="1"/>
          <line x1="0" y1="0" x2="283" y2="-100" stroke="white" stroke-width="1"/>
        </g>
      </svg>

      <div class="bg-rings" aria-hidden="true"></div>

      <div class="logo-zone">
        <svg class="yamaha-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <radialGradient id="glow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#4d88ff"/>
              <stop offset="100%" stop-color="#1a4fcc"/>
            </radialGradient>
          </defs>
          <circle cx="50" cy="50" r="48" fill="none" stroke="#1a4fcc" stroke-width="1.5" opacity="0.5"/>
          <circle cx="50" cy="50" r="42" fill="none" stroke="#2255dd" stroke-width="0.5" opacity="0.3"/>
          <g transform="translate(50,50) rotate(0)">
            <rect x="-5" y="-38" width="10" height="28" rx="5" fill="url(#glow)"/>
            <rect x="-4" y="-12" width="8" height="14" rx="0" fill="#1a4fcc" opacity="0.6"/>
          </g>
          <g transform="translate(50,50) rotate(120)">
            <rect x="-5" y="-38" width="10" height="28" rx="5" fill="url(#glow)"/>
            <rect x="-4" y="-12" width="8" height="14" rx="0" fill="#1a4fcc" opacity="0.6"/>
          </g>
          <g transform="translate(50,50) rotate(240)">
            <rect x="-5" y="-38" width="10" height="28" rx="5" fill="url(#glow)"/>
            <rect x="-4" y="-12" width="8" height="14" rx="0" fill="#1a4fcc" opacity="0.6"/>
          </g>
          <circle cx="50" cy="50" r="10" fill="url(#glow)"/>
          <circle cx="50" cy="50" r="6" fill="#0a0a0a"/>
          <circle cx="50" cy="50" r="3" fill="#4d88ff"/>
        </svg>

        <div class="brand-name">YAMAHA</div>
        <div class="brand-tagline">Revs Your Heart</div>
      </div>

      <div class="loader-bar-wrap" aria-hidden="true">
        <div class="loader-bar"></div>
      </div>

      <div class="dots" aria-hidden="true">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div class="loader-status">Loading experience</div>
    </div>
  </div>
  <h2>Contact Submissions</h2>
  <a href="/admin/logout" style="float:right; color:#5391fb;">Logout</a>
  <table>
    <tr>
      <th>#</th><th>Name</th><th>Email</th><th>Model</th><th>Message</th><th>Time</th>
    </tr>
    {% for lead in leads %}
    <tr>
      <td>{{ lead.id }}</td>
      <td>{{ lead.name }}</td>
      <td>{{ lead.email }}</td>
      <td>{{ lead.model }}</td>
      <td>{{ lead.message }}</td>
      <td>{{ lead.created }}</td>
    </tr>
    {% endfor %}
  </table>

  <script>
    const _yl = document.getElementById('yamaha-loader');
    if (_yl) _yl.setAttribute('data-started-at', String(performance.now()));

    window.addEventListener('load', () => {
      const loader = document.getElementById('yamaha-loader');
      if (!loader) return;
      const minVisibleMs = 1400;
      const fadeMs = 520;
      const startedAt = Number(loader.getAttribute('data-started-at')) || performance.now();
      const elapsed = performance.now() - startedAt;
      const wait = Math.max(0, minVisibleMs - elapsed);

      window.setTimeout(() => {
        loader.classList.add('is-hidden');
        window.setTimeout(() => loader.remove(), fadeMs + 80);
      }, wait);
    });
  </script>
</body>
</html>
